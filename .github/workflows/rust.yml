name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build frost-dkg-ops crate with default features
      run: cargo build -p frost-dkg-ops --verbose

    - name: Build frost-dkg-ops crate with no default features
      run: cargo build -p frost-dkg-ops --no-default-features --verbose
      
    - name: Rust frost-dkg-ops crate tests with default features
      run: cargo test -p frost-dkg-ops --verbose

    - name: Build frost-dkg-ops crate with no default features
      run: cargo test -p frost-dkg-ops --no-default-features
